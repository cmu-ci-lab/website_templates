<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<meta name="theme-color" content="#ffffff">
	<meta name="description" content="Your name">
	<!--Social preview metadata: fill in per website; og:image must be an absolute URL to a raster (PNG or JPEG) image.-->
	<meta property="og:title" content="Your name">
	<meta property="og:description" content="Brief bio.">
	<meta property="og:image" content="https://your.website/index_files/preview.png">
	<meta property="og:url" content="https://your.website/">
	<meta property="og:type" content="website">
	<meta name="twitter:card" content="summary_large_image">
	<!--If this page is reachable at multiple URLs, uncomment this line and set it to the preferred URL.-->
	<!--<link rel="canonical" href="https://your.website/">-->
	<link rel="icon" href="/shared/favicon.png" type="image/png">
	<link rel="icon" href="/shared/imaging.svg" type="image/svg+xml">
	<!--Preload only the font faces used above the fold. Font Awesome sets font-display: block, so without the preload the icons below render as blank space until the font arrives.-->
	<link rel="preload" href="/shared/fonts/AvenirNext/avenirnext-regular.woff2" as="font" type="font/woff2" crossorigin>
	<link rel="preload" href="/shared/fonts/AvenirNext/avenirnext-demi.woff2" as="font" type="font/woff2" crossorigin>
	<link rel="preload" href="/shared/fontawesome/webfonts/fa-solid-900.woff2" as="font" type="font/woff2" crossorigin>
	<link rel="preload" href="/shared/fontawesome/webfonts/fa-brands-400.woff2" as="font" type="font/woff2" crossorigin>
	<!--Font Awesome Free: the icon-name map, then the styles used. Drop brands.min.css (and its preload above) if you remove every fa-brands icon.-->
	<link rel="stylesheet" href="/shared/fontawesome/css/fontawesome.min.css">
	<link rel="stylesheet" href="/shared/fontawesome/css/solid.min.css">
	<link rel="stylesheet" href="/shared/fontawesome/css/brands.min.css">
	<link rel="stylesheet" href="/shared/style.css">
	<title>Your name</title>
</head>

<body>
	<a class="skip-link visually-hidden" href="#main">Skip to main content</a>

	<header>
		<h1>Your name</h1>

		<div id="personal">
			<img id="photo" height="150" width="150" src="index_files/photo.jpg" alt="Your name">

			<ul>
				<li><a href="mailto:YourEmail@YourProvider.YourDomain"><i class="fa-solid fa-envelope fa-sm fa-fw" aria-hidden="true"></i>&nbsp;email</a></li>
				<li><a href="index_files/cv.pdf"><i class="fa-solid fa-address-card fa-sm fa-fw" aria-hidden="true"></i>&nbsp;cv</a></li>
				<li><a href="https://scholar.google.com/citations?hl=en&amp;user=YourScholarID"><i class="fa-solid fa-graduation-cap fa-sm fa-fw" aria-hidden="true"></i>&nbsp;Google scholar</a></li>
				<li><a href="https://orcid.org/YourOrcId"><i class="fa-brands fa-orcid fa-sm fa-fw" aria-hidden="true"></i>&nbsp;ORCID</a></li>
				<li><a href="https://imaging.cs.cmu.edu"><i class="fa-solid fa-camera-retro fa-sm fa-fw" aria-hidden="true"></i>&nbsp;Carnegie Mellon computational imaging</a></li>
			</ul>
		</div>

		<p>Brief bio.</p>

		<p>Brief introduction.</p>
	</header>

	<main id="main" tabindex="-1">
	<section id="research">
		<h2>Research</h2>
		<p>Your research overview.</p>
	</section>

	<section id="publications">
		<h2>Publications</h2>

		<figure class="entry">
			<a href="https://paper.website.com"><img src="index_files/paper_icon.jpg" alt="Paper title" height="80" width="80" loading="lazy"></a>
			<figcaption>
				<p><a href="https://paper.website.com"><strong>Paper title</strong></a><br>
				Paper authors, <strong>Your name</strong>, other paper authors<br>
				Publication venue and year</p>
			</figcaption>
		</figure>
	</section>

	<section id="teaching">
		<h2>Teaching</h2>

		<figure class="entry">
			<a href="https://course.website.com"><img src="index_files/course_icon.jpg" alt="Course name" height="80" width="80" loading="lazy"></a>
			<figcaption>
				<p><a href="https://course.website.com"><strong>Course name</strong></a><br>
				<strong>Instructor name</strong>, institution, years</p>
			</figcaption>
		</figure>
	</section>

	<section id="other">
		<h2>Other content</h2>
		<p>Section for any other content you want to include.</p>
	</section>
	</main>
</body>
</html>
